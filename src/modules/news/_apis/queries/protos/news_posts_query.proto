syntax = "proto3";
import "google/protobuf/wrappers.proto";
import "result.proto";
import "common.proto";
package NewsPosts;

service NewsPostsQuery {
  rpc GetAllNewsPosts(GetAllNewsPostsRequest) returns (CommonResult);
  rpc GetDetailNewsPosts(GetDetailNewsPostsRequest) returns (CommonResult);
  rpc AdminGetAllNewsPosts(AdminGetAllNewsPostsRequest) returns (CommonResult);
}

message GetAllNewsPostsRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated OrderByOption OrderBy = 3;
      optional google.protobuf.Int32Value CategoryId = 4;
}
message GetDetailNewsPostsRequest {
      optional google.protobuf.Int32Value Id = 1;
}
message AdminGetAllNewsPostsRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated FilterOption Filter = 3;
      repeated OrderByOption OrderBy = 4;
}
